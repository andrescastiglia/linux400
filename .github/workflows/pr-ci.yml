name: PR CI — Tests + ISO Build

on:
  pull_request:
    branches:
      - testing
      - main

jobs:
  test:
    name: Tests (l400)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libattr1-dev \
            xattr

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (libl400)
        run: cargo clippy -p l400 --all-targets -- -D warnings

      - name: Run tests (libl400)
        run: cargo test -p l400 --verbose

      - name: Build user-space tools
        run: |
          cargo build -p c400c
          cargo build -p clc
          cargo build -p l400-loader

  build-iso:
    name: Build ISO
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-iso-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cargo-iso-

      - name: Install ISO build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xorriso \
            syslinux \
            syslinux-common \
            syslinux-utils \
            isolinux \
            mtools \
            curl \
            squashfs-tools \
            dosfstools \
            libattr1-dev \
            xattr

      - name: Build user-space tools (release)
        run: |
          cargo build -p c400c --release
          cargo build -p clc --release
          cargo build -p l400-loader --release

      - name: Determine ISO suffix
        id: iso_name
        run: |
          if [[ "${{ github.base_ref }}" == "testing" ]]; then
            echo "suffix=_unstable" >> "$GITHUB_OUTPUT"
            echo "iso_name=linux400_unstable.iso" >> "$GITHUB_OUTPUT"
          else
            echo "suffix=" >> "$GITHUB_OUTPUT"
            echo "iso_name=linux400.iso" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Alpine rootfs (Docker)
        run: |
          mkdir -p "${{ github.workspace }}/output"
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            -e OUTPUT_DIR=/work/output \
            -e L400_SRC_DIR=/work \
            alpine:3.20 \
            sh -lc '
              set -eu
              apk add --no-cache bash curl
              bash scripts/build/build_alpine_base.sh
            '
          sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}/output"

      - name: Build initramfs
        run: |
          bash scripts/build/build_initramfs.sh
        env:
          OUTPUT_DIR: ${{ github.workspace }}/output
          L400_SRC_DIR: ${{ github.workspace }}

      - name: Build ISO
        run: |
          bash scripts/build/build_iso.sh
        env:
          OUTPUT_DIR: ${{ github.workspace }}/output
          ISO_NAME: ${{ steps.iso_name.outputs.iso_name }}

      - name: Rename ISO deterministically
        id: finalize_iso
        run: |
          set -euo pipefail
          TARGET_NAME="${{ steps.iso_name.outputs.iso_name }}"
          mapfile -t iso_files < <(find output -type f -name "*.iso" | sort)
          if [[ "${#iso_files[@]}" -ne 1 ]]; then
            echo "Expected exactly one ISO in output, found ${#iso_files[@]}" >&2
            printf 'Files found:\n%s\n' "${iso_files[*]-}" >&2
            exit 1
          fi
          SOURCE_ISO="${iso_files[0]}"
          TARGET_ISO="output/${TARGET_NAME}"
          if [[ "$SOURCE_ISO" != "$TARGET_ISO" ]]; then
            mv "$SOURCE_ISO" "$TARGET_ISO"
          fi
          echo "iso_path=${TARGET_ISO}" >> "$GITHUB_OUTPUT"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.iso_name.outputs.iso_name }}
          path: ${{ steps.finalize_iso.outputs.iso_path }}
          retention-days: 14
