name: Setup Branch Protection

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  protect:
    name: Apply branch protection rules
    runs-on: ubuntu-latest

    steps:
      - name: Protect main (no direct push, no deletion)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateBranchProtection({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main',
              required_status_checks: {
                strict: true,
                contexts: ['Tests (l400)']
              },
              enforce_admins: false,
              required_pull_request_reviews: {
                dismiss_stale_reviews: false,
                require_code_owner_reviews: false,
                required_approving_review_count: 0
              },
              restrictions: null,
              allow_force_pushes: false,
              allow_deletions: false,
              block_creations: false
            });
            core.info('✅ main: protegido');

      - name: Protect testing (no direct push, no deletion)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateBranchProtection({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'testing',
              required_status_checks: {
                strict: true,
                contexts: ['Tests (l400)']
              },
              enforce_admins: false,
              required_pull_request_reviews: {
                dismiss_stale_reviews: false,
                require_code_owner_reviews: false,
                required_approving_review_count: 0
              },
              restrictions: null,
              allow_force_pushes: false,
              allow_deletions: false,
              block_creations: false
            });
            core.info('✅ testing: protegido');

      - name: Protect develop (push directo OK, no deletion, no force-push)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateBranchProtection({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'develop',
              required_status_checks: null,
              enforce_admins: false,
              required_pull_request_reviews: null,
              restrictions: null,
              allow_force_pushes: false,
              allow_deletions: false,
              block_creations: false
            });
            core.info('✅ develop: protegido');
